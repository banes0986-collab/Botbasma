<!DOCTYPE html>
<html>
<head>
    <title>SİSTEME GİRİŞ</title>
    <style>
        body { background: #000; color: #0f0; font-family: monospace; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-box { border: 1px solid #0f0; padding: 30px; background: #050505; box-shadow: 0 0 20px #0f05; width: 300px; }
        input { background: #000; border: 1px solid #0f0; color: #0f0; padding: 10px; margin: 10px 0; width: 100%; box-sizing: border-box; outline: none; }
        button { background: #0f0; color: #000; border: none; padding: 12px; width: 100%; cursor: pointer; font-weight: bold; }
        #status { margin-top: 15px; text-align: center; font-size: 12px; }
    </style>
</head>
<body>

<div class="login-box">
    <h2 style="text-align:center">ADMIN LOGIN</h2>
    <input type="text" id="user" placeholder="Kullanıcı Adı (admin)">
    <input type="password" id="pass" placeholder="Şifre (triger123)">
    <hr style="border:0; border-top:1px solid #222">
    <input type="text" id="ip" placeholder="Sunucu IP">
    <input type="text" id="nick" placeholder="Bot İsmi">
    <button onclick="baglan()">SİSTEME SIZ</button>
    <div id="status">Sinyal bekleniyor...</div>
</div>

<script>
    function baglan() {
        const status = document.getElementById('status');
        status.innerText = "KİMLİK DOĞRULANIYOR...";

        fetch('https://botbasma.onrender.com/login-execute', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                user: document.getElementById('user').value,
                pass: document.getElementById('pass').value,
                ip: document.getElementById('ip').value,
                nick: document.getElementById('nick').value
            })
        })
        .then(res => res.text())
        .then(data => {
            if(data === "SUCCESS") {
                status.innerText = "ERİŞİM SAĞLANDI! BOT GİRİYOR.";
                status.style.color = "#0f0";
            } else {
                status.innerText = "HATALI KİMLİK BİLGİSİ!";
                status.style.color = "red";
            }
        });
    }
</script>

</body>
</html>
