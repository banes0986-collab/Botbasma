<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TriggerBot v3 - Control Center</title>
    <style>
        :root { --neon-green: #00ff41; --dark-bg: #050505; --error-red: #ff3131; }
        body { background: #000; color: var(--neon-green); font-family: 'Courier New', monospace; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        
        /* GİRİŞ EKRANI */
        #login-screen { text-align: center; border: 1px solid var(--neon-green); padding: 40px; box-shadow: 0 0 20px rgba(0,255,65,0.2); }
        input { background: #000; border: 1px solid var(--neon-green); color: var(--neon-green); padding: 10px; margin: 10px; outline: none; width: 220px; text-align: center; }
        button { background: var(--neon-green); color: #000; border: none; padding: 10px 20px; font-weight: bold; cursor: pointer; transition: 0.3s; text-transform: uppercase; }
        button:hover { background: #000; color: var(--neon-green); box-shadow: 0 0 10px var(--neon-green); }

        /* ANA PANEL */
        #main-panel { display: none; width: 95%; height: 90vh; grid-template-columns: 1fr 1.2fr; gap: 20px; }
        .box { border: 1px solid var(--neon-green); padding: 20px; background: rgba(0, 20, 0, 0.3); position: relative; display: flex; flex-direction: column; box-shadow: inset 0 0 10px rgba(0,255,65,0.1); }
        h2 { font-size: 16px; margin-top: 0; border-bottom: 1px solid var(--neon-green); padding-bottom: 10px; text-transform: uppercase; letter-spacing: 2px; }

        /* SİSTEM DURUMU (RENDER) */
        .status-bar { position: absolute; top: 15px; right: 20px; font-size: 11px; display: flex; align-items: center; gap: 8px; font-weight: bold; }
        .dot { width: 12px; height: 12px; border-radius: 50%; background: #333; transition: 0.5s; }
        .online { background: var(--neon-green); box-shadow: 0 0 10px var(--neon-green); }
        .offline { background: var(--error-red); box-shadow: 0 0 10px var(--error-red); }

        /* BOT EKRANI (LOGS) */
        #log-screen { flex-grow: 1; background: #000; border: 1px solid #004400; padding: 15px; overflow-y: auto; font-size: 12px; color: #00ff41; line-height: 1.6; border-radius: 5px; }
        .log-entry { margin-bottom: 8px; border-left: 2px solid #004400; padding-left: 10px; border-bottom: 1px solid rgba(0,255,65,0.05); }
        .log-time { color: #008822; font-size: 10px; margin-right: 5px; }
        .log-tag { color: #fff; font-weight: bold; }

        .control-inputs input { width: 90%; margin: 8px 0; font-size: 14px; }
        .action-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .danger { background: #400 !important; color: var(--error-red) !important; border: 1px solid var(--error-red) !important; }
        
        /* SCROLLBAR */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #004400; }
    </style>
</head>
<body>

    <div id="login-screen">
        <h1 style="letter-spacing: 5px;">ACCESS_REQUIRED</h1>
        <p style="color: #008822;">Operatör Kimliği Doğrulanıyor...</p>
        <input type="text" id="user" placeholder="OPERATOR_ID">
        <input type="password" id="pass" placeholder="PASS_CODE">
        <br>
        <button onclick="checkAuth()">SİSTEMİ BAŞLAT</button>
    </div>

    <div id="main-panel">
        <div class="box">
            <h2>Kontrol Ünitesi ⚡</h2>
            <div class="status-bar">
                SİSTEM: <div id="server-dot" class="dot"></div> <span id="server-text">TARANIYOR...</span>
            </div>
            
            <div class="control-inputs" style="margin-top: 20px;">
                <label style="font-size: 10px;">HEDEF PARAMETRELERİ:</label>
                <input type="text" id="target-ip" placeholder="Sunucu IP (play.vampircraft.xyz)">
                <input type="text" id="target-nick" placeholder="Bot Nickname">
                <button style="width: 100%; margin-top: 10px;" onclick="startOp()">SIZMA İŞLEMİNİ BAŞLAT</button>
            </div>

            <hr style="border: 0.5px solid #004400; margin: 25px 0; width: 100%;">

            <label style="font-size: 10px;">İLETİŞİM KANALI:</label>
            <input type="text" id="chat-msg" placeholder="Sohbete veri gönder...">
            <button onclick="sendChat()" style="background: #003300; color: #00ff41; border: 1px solid #00ff41;">VERİ FIRLAT</button>

            <div class="action-btns">
                <button onclick="action('bot-zipla')">ZIPLAT</button>
                <button class="danger" onclick="action('bot-cikis')">SİSTEMDEN ÇIK</button>
            </div>
        </div>

        <div class="box">
            <h2>Bot Çıktısı / Terminal Log 📡</h2>
            <div id="log-screen">
                <div class="log-entry"><span class="log-time">[SİSTEM]</span> Çekirdek yükleniyor... Beklemede.</div>
            </div>
        </div>
    </div>

<script>
    // SENİN RENDER LİNKİNİ BURAYA SABİTLEDİM
    const RENDER_URL = "https://botbasma.onrender.com"; 

    function checkAuth() {
        const u = document.getElementById('user').value;
        const p = document.getElementById('pass').value;
        if(u === "admin" && p === "trigger123") {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('main-panel').style.display = 'grid';
            addLog("Erişim onaylandı. Kontrol Merkezi aktif.");
            checkServerStatus();
            setInterval(checkServerStatus, 15000); // 15 saniyede bir kontrol
        } else {
            alert("HATALI KİMLİK BİLGİSİ!");
        }
    }

    function checkServerStatus() {
        const dot = document.getElementById('server-dot');
        const text = document.getElementById('server-text');
        
        // Render makinesine basit bir ping atıyoruz
        fetch(`${RENDER_URL}/bot-zipla`) 
            .then(() => {
                dot.className = "dot online";
                text.innerText = "ONLINE";
            })
            .catch(() => {
                dot.className = "dot offline";
                text.innerText = "OFFLINE";
                addLog("KRİTİK HATA: Render sunucusu yanıt vermiyor!");
            });
    }

    function addLog(msg) {
        const logScreen = document.getElementById('log-screen');
        const time = new Date().toLocaleTimeString();
        logScreen.innerHTML += `<div class="log-entry"><span class="log-time">[${time}]</span> ${msg}</div>`;
        logScreen.scrollTop = logScreen.scrollHeight; // Log ekranını aşağı kaydırır
    }

    function startOp() {
        const ip = document.getElementById('target-ip').value;
        const nick = document.getElementById('target-nick').value;
        if(!ip || !nick) return alert("Parametreleri doldur!");

        addLog(`İşlem başlatıldı: <span class="log-tag">${nick}</span> sızıyor -> <span class="log-tag">${ip}</span>`);
        
        fetch(`${RENDER_URL}/bot-gonder?ip=${ip}&isim=${nick}`)
            .then(r => r.text())
            .then(d => {
                addLog(`SİSTEM YANITI: ${d}`);
                addLog("Bypass Protokolü: /register ve Anti-AFK aktif edildi.");
            })
            .catch(e => addLog("Bağlantı hatası oluştu!"));
    }

    function sendChat() {
        const msg = document.getElementById('chat-msg').value;
        if(!msg) return;
        fetch(`${RENDER_URL}/bot-mesaj?mesaj=${msg}`)
            .then(r => r.text())
            .then(d => {
                addLog(`VERİ GÖNDERİLDİ: ${msg}`);
                document.getElementById('chat-msg').value = ""; // Kutuyu temizle
            });
    }

    function action(type) {
        fetch(`${RENDER_URL}/${type}`)
            .then(r => r.text())
            .then(d => addLog(`KOMUT: ${d}`));
    }
</script>
</body>
</html>
