        /* MATRIX BG */
        #matrix { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; opacity: 0.2; }

        header { text-align: center; margin-bottom: 30px; }

            letter-spacing: 5px; animation: glitch 1s infinite linear alternate-reverse;
        }
        @keyframes glitch {
            0% { text-shadow: 2px 0 var(--neon); }
            100% { text-shadow: -2px 0 #00ffff; }
        }

        }
