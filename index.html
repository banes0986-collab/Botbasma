<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>TriggerGuard v2 | Ultimate Defense</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg: #0b0e14; --card: #151921; --accent: #00d2ff; --gold: #ffd700; --red: #ff4d4d; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; }
        .hidden { display: none !important; }
        
        /* UI Tasarımı */
        .container { display: flex; height: 100vh; }
        .sidebar { width: 280px; background: var(--card); padding: 20px; border-right: 1px solid #222; }
        .main { flex: 1; padding: 40px; overflow-y: auto; }
        
        /* Kartlar ve Elemanlar */
        .card { background: #1c222d; padding: 20px; border-radius: 12px; border-left: 5px solid var(--accent); margin-bottom: 20px; }
        .btn { padding: 12px 25px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-primary { background: var(--accent); color: #000; }
        .btn-danger { background: var(--red); color: white; }

        /* Login/Register Form */
        #auth-page { height: 100vh; display: flex; align-items: center; justify-content: center; background: #080a0f; }
        .auth-box { background: var(--card); padding: 40px; border-radius: 15px; width: 400px; text-align: center; border: 1px solid #333; }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #080a0f; border: 1px solid #444; color: white; border-radius: 6px; }
    </style>
</head>
<body>

    <div id="auth-page">
        <div class="auth-box">
            <h1 id="auth-title">TRIGGERGUARD</h1>
            <div id="login-form">
                <input type="email" id="email" placeholder="E-posta">
                <input type="password" id="pass" placeholder="Şifre">
                <button class="btn btn-primary" style="width:100%" onclick="handleLogin()">GİRİŞ YAP</button>
                <p onclick="toggleAuth()">Hesabın yok mu? Kayıt Ol</p>
            </div>
            <div id="register-form" class="hidden">
                <input type="email" id="reg-email" placeholder="E-posta">
                <input type="password" id="reg-pass" placeholder="Yeni Şifre">
                <button class="btn btn-primary" style="width:100%" onclick="handleRegister()">KAYIT OL</button>
                <p onclick="toggleAuth()">Zaten hesabın var mı? Giriş Yap</p>
            </div>
        </div>
    </div>

    <div id="app" class="hidden container">
        <div class="sidebar">
            <h2 id="user-role-display" style="color:var(--gold)">--</h2>
            <p id="user-mail-display" style="font-size:12px; opacity:0.6"></p>
            <hr border="1" color="#333">
            <div class="nav-item" onclick="showSection('home')">Dashboard</div>
            <div id="admin-menu" class="hidden">
                <h3 style="color:var(--red); font-size:14px; margin-top:30px;">KURUCU ÖZEL</h3>
                <div class="nav-item" onclick="fetchUsers()">Kullanıcı Listesi</div>
                <div class="nav-item" onclick="showSection('settings')">Sistem Ayarları</div>
            </div>
            <button class="btn btn-danger" style="margin-top:50px" onclick="location.reload()">ÇIKIŞ</button>
        </div>

        <div class="main">
            <div id="home-sec">
                <h1>Sistem Durumu</h1>
                <div class="card">
                    <h3>Sunucu IP: <span id="mc-ip" style="color:var(--accent)">127.0.0.1</span></h3>
                    <p>Korumalı Port: <b>25577</b></p>
                    <div id="shield-status" style="color:var(--green)">DURUM: AKTİF</div>
                </div>
            </div>

            <div id="admin-sec" class="hidden">
                <h1>Tüm Kayıtlı Kullanıcılar</h1>
                <div id="user-list-container"></div>
            </div>
        </div>
    </div>

    <script>
        let currentUser = null;
        const API = "http://localhost:3000/api";

        function toggleAuth() {
            document.getElementById('login-form').classList.toggle('hidden');
            document.getElementById('register-form').classList.toggle('hidden');
        }

        async function handleLogin() {
            const mail = document.getElementById('email').value;
            const pass = document.getElementById('pass').value;
            // API'ye bağlan (VDS ise IP yaz)
            if(mail === 'triggerbaba31@gmail.com' && pass === 'trigger3163') {
                currentUser = { mail, role: 'KURUCU' };
                loadApp();
            } else {
                alert("Giriş bilgileri hatalı!");
            }
        }

        function loadApp() {
            document.getElementById('auth-page').classList.add('hidden');
            document.getElementById('app').classList.remove('hidden');
            document.getElementById('user-role-display').innerText = currentUser.role;
            document.getElementById('user-mail-display').innerText = currentUser.mail;
            
            if(currentUser.role === 'KURUCU') {
                document.getElementById('admin-menu').classList.remove('hidden');
            }
        }

        async function fetchUsers() {
            // Burası API'den kullanıcı listesini çeker
            document.getElementById('home-sec').classList.add('hidden');
            document.getElementById('admin-sec').classList.remove('hidden');
            const container = document.getElementById('user-list-container');
            container.innerHTML = "Lütfen bekleyin, veriler çekiliyor...";
            // Gerçek API'de burası fetch ile dolar
        }
    </script>
</body>
</html>
