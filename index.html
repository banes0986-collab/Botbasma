<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LegacyBots | Kontrol Paneli</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="dashboard-container">
        <header class="main-header">
            <div class="logo">Legacy<span>Bots</span></div>
            <div class="tagline">7/24 Aternos Aktiflik Sistemi</div>
        </header>

        <main class="status-card">
            <div class="status-header">
                <h2>Sistem Durumu</h2>
                <span id="status-indicator" class="indicator loading"></span>
            </div>
            
            <div class="status-body">
                <div class="status-row">
                    <span class="label">Bot Durumu:</span>
                    <span id="sistem-durum" class="value text-loading">Yükleniyor...</span>
                </div>
                <div class="status-row">
                    <span class="label">Hedef Sunucu:</span>
                    <span class="value IP-highlight">sunucu-adresiniz.aternos.me</span>
                </div>
            </div>

            <div class="console-box">
                <div class="console-header">Canlı Log Çıktısı</div>
                <div id="console-logs" class="console-content">
                    [Sistem] LegacyBots altyapısı başlatılıyor...
                </div>
            </div>
        </main>

        <footer class="main-footer">
            Geliştirici: <span class="owner">TriggerBaba</span> &copy; 2026
        </footer>
    </div>

    <script>
        async function checkStatus() {
            try {
                const response = await fetch('/status');
                const data = await response.json();
                
                const statusText = document.getElementById('sistem-durum');
                const indicator = document.getElementById('status-indicator');
                const logBox = document.getElementById('console-logs');

                // Veri başarıyla gelirse arayüzü güncelle
                statusText.innerText = data.status + " - " + data.message;
                statusText.className = "value text-success";
                indicator.className = "indicator online";
                
                // Log ekranına bağlantı başarılı mesajı ekle (eğer daha önce eklenmediyse)
                if(!logBox.innerHTML.includes("bağlantısı aktif")) {
                    const zaman = new Date().toLocaleTimeString();
                    logBox.innerHTML += `<br><span class="log-success">[${zaman}] [LegacyBot_724] Aternos bağlantısı aktif, AFK koruması devrede.</span>`;
                }
            } catch (error) {
                const statusText = document.getElementById('sistem-durum');
                const indicator = document.getElementById('status-indicator');
                
                // Hata durumunda (Sunucu kapalıysa) kırmızıya çevir
                statusText.innerText = "Bağlantı Kesildi (Sunucu Kapalı)";
                statusText.className = "value text-danger";
                indicator.className = "indicator offline";
            }
        }
        
        // Her 5 saniyede bir durumu kontrol et
        setInterval(checkStatus, 5000);
        checkStatus();
    </script>
</body>
</html>
