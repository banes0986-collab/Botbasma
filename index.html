<!DOCTYPE html>
<html>
<head>
    <title>MINECRAFT BOT INJECTOR</title>
    <style>
        body { background: #111; color: white; font-family: sans-serif; text-align: center; padding-top: 50px; }
        .main { border: 2px solid #00ff00; display: inline-block; padding: 30px; background: #000; border-radius: 15px; box-shadow: 0 0 20px #00ff0055; }
        input { padding: 12px; margin: 10px; width: 280px; border-radius: 5px; border: 1px solid #00ff00; background: #111; color: #00ff00; }
        button { padding: 15px 30px; background: #00ff00; color: #000; border: none; font-weight: bold; cursor: pointer; border-radius: 5px; text-transform: uppercase; }
        #log { margin-top: 20px; color: #888; font-size: 14px; }
    </style>
</head>
<body>
    <div class="main">
        <h1 style="color: #00ff00;">TRIGGER BOT V1</h1>
        <input type="text" id="target" placeholder="IP:PORT (138.2.137.64:25566)">
        <br>
        <input type="text" id="nick" placeholder="Bot İsmi">
        <br>
        <button onclick="inject()">BOTU SUNUCUYA SOK</button>
        <div id="log">Sistem Beklemede...</div>
    </div>

    <script>
        function inject() {
            const ip = document.getElementById('target').value;
            const nick = document.getElementById('nick').value;
            const log = document.getElementById('log');
            log.innerText = "Sinyal gönderiliyor, sunucuya bağlanılıyor...";
            
            fetch(`https://botbasma.onrender.com/spawn-bot?ip=${ip}&nick=${nick}`)
                .then(() => { log.innerText = "Komut iletildi! Sunucuyu kontrol et."; });
        }
    </script>
</body>
</html>
