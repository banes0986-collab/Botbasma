<!DOCTYPE html>
<html>
<head>
    <title>ROOT ACCESS TERMINAL</title>
    <style>
        body { background: #020202; color: #00ff41; font-family: 'Courier New', monospace; margin: 0; padding: 20px; }
        #login-gate { position: fixed; top:0; left:0; width:100%; height:100%; background:#000; z-index:100; display:flex; flex-direction:column; justify-content:center; align-items:center; }
        .term-box { border: 1px solid #00ff41; padding: 20px; background: #050505; box-shadow: 0 0 15px rgba(0,255,65,0.2); }
        #console { background: #000; height: 300px; overflow-y: scroll; padding: 10px; border: 1px solid #222; font-size: 13px; color: #00ff41; margin-bottom: 15px; }
        input { background: #000; border: 1px solid #00ff41; color: #00ff41; padding: 10px; margin: 5px 0; width: 100%; box-sizing: border-box; }
        button { background: #00ff41; color: #000; border: none; padding: 12px; width: 100%; font-weight: bold; cursor: pointer; }
        .status-bar { font-size: 11px; color: #555; margin-top: 10px; }
    </style>
</head>
<body>

<div id="login-gate">
    <div style="width: 250px;">
        <h2 style="text-align: center;">SYSTEM LOGIN</h2>
        <input type="password" id="pass" placeholder="Enter Credentials...">
        <button onclick="unlock()">ACCESS</button>
    </div>
</div>

<div class="term-box">
    <div style="border-bottom: 1px solid #222; margin-bottom: 15px; padding-bottom: 5px;">REMOTE CONTROL INTERFACE [v1.20.1-STABLE]</div>
    <div id="console">Initializing terminal...</div>
    <input type="text" id="target" placeholder="Target Node IP (play.server.com)">
    <input type="text" id="nick" placeholder="Identity Nick">
    <button onclick="launch()">EXECUTE PROTOCOL</button>
    <div class="status-bar">Connection: SSL Secured | Latency: Real-time logs</div>
</div>

<script>
    const RENDER = "https://botbasma.onrender.com";

    function unlock() {
        if(document.getElementById('pass').value === "root123") {
            document.getElementById('login-gate').style.display = 'none';
            setInterval(fetchLogs, 2000);
        } else { alert("ACCESS DENIED."); }
    }

    function launch() {
        fetch(`${RENDER}/exec-command`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                host: document.getElementById('target').value,
                user: document.getElementById('nick').value,
                auth: "root123"
            })
        });
    }

    function fetchLogs() {
        fetch(`${RENDER}/terminal-stream`)
            .then(res => res.json())
            .then(data => {
                const c = document.getElementById('console');
                c.innerHTML = data.logs.join('<br>');
                c.scrollTop = c.scrollHeight;
            });
    }
</script>
</body>
</html>
