<!DOCTYPE html>
<html>
<head>
    <title>BOT PANEL</title>
    <style>
        body { background: #1a1a1a; color: white; font-family: sans-serif; text-align: center; padding-top: 100px; }
        .box { border: 2px solid #00ff00; display: inline-block; padding: 20px; border-radius: 10px; }
        input { padding: 10px; margin: 10px; width: 200px; }
        button { padding: 10px 20px; background: #00ff00; border: none; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div class="box">
    <h1>LEGACY BOT PANEL</h1>
    <input type="text" id="ip" placeholder="Sunucu IP">
    <br>
    <input type="text" id="isim" placeholder="Bot İsmi">
    <br>
    <button onclick="gonder()">BOTU GÖNDER</button>
    <p id="durum">Hazır...</p>
</div>

<script>
    function gonder() {
        const ip = document.getElementById('ip').value;
        const isim = document.getElementById('isim').value;
        document.getElementById('durum').innerText = "Gönderiliyor...";
        
        fetch(`https://botbasma.onrender.com/bot-gonder?ip=${ip}&isim=${isim}`)
            .then(() => { document.getElementById('durum').innerText = "Bot yola çıktı!"; });
    }
</script>

</body>
</html>
