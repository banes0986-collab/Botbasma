<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TriggerBot v3 - Control Center</title>
    <style>
        :root { --neon-green: #00ff41; --dark-bg: #050505; --error-red: #ff3131; }
        body { background: #000; color: var(--neon-green); font-family: 'Courier New', monospace; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        
        /* GİRİŞ EKRANI */
        #login-screen { text-align: center; border: 1px solid var(--neon-green); padding: 40px; box-shadow: 0 0 20px rgba(0,255,65,0.2); }
        input { background: #000; border: 1px solid var(--neon-green); color: var(--neon-green); padding: 10px; margin: 10px; outline: none; width: 200px; }
        button { background: var(--neon-green); color: #000; border: none; padding: 10px 20px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background: #000; color: var(--neon-green); box-shadow: 0 0 10px var(--neon-green); }

        /* ANA PANEL */
        #main-panel { display: none; width: 95%; height: 90vh; grid-template-columns: 1fr 1fr; gap: 20px; }
        .box { border: 1px solid var(--neon-green); padding: 20px; background: rgba(0, 20, 0, 0.3); position: relative; display: flex; flex-direction: column; }
        h2 { font-size: 18px; margin-top: 0; border-bottom: 1px solid var(--neon-green); padding-bottom: 10px; text-transform: uppercase; }

        /* SİSTEM DURUMU (RENDER) */
        .status-bar { position: absolute; top: 10px; right: 20px; font-size: 12px; display: flex; align-items: center; gap: 5px; }
        .dot { width: 10px; height: 10px; border-radius: 50%; background: grey; }
        .online { background: var(--neon-green); box-shadow: 0 0 10px var(--neon-green); }
        .offline { background: var(--error-red); box-shadow: 0 0 10px var(--error-red); }

        /* BOT EKRANI (LOGS) */
        #log-screen { flex-grow: 1; background: #000; border: 1px solid #004400; padding: 10px; overflow-y: auto; font-size: 13px; color: #00ff41; line-height: 1.5; }
        .log-entry { margin-bottom: 5px; border-left: 2px solid #004400; padding-left: 8px; }
        .log-time { color: #008822; font-size: 11px; }

        .control-inputs input { width: 90%; margin: 5px 0; }
        .action-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .danger { background: var(--error-red); color: white; }
    </style>
</head>
<body>

    <div id="login-screen">
        <h1>ACCESS_DENIED</h1>
        <p>Sistem yetkisi gerekiyor...</p>
        <input type="text" id="user" placeholder="Kullanıcı">
        <input type="password" id="pass" placeholder="Şifre">
        <br>
        <button onclick="checkAuth()">SİSTEME SIZ</button>
    </div>

    <div id="main-panel">
        <div class="box">
            <h2>Kontrol Ünitesi ⚡</h2>
            <div class="status-bar">
                Sunucu: <div id="server-dot" class="dot"></div> <span id="server-text">KONTROL EDİLİYOR...</span>
            </div>
            
            <div class="control-inputs">
                <input type="text" id="target-ip" placeholder="Sunucu IP (play.vampircraft.xyz)">
                <input type="text" id="target-nick" placeholder="Bot Nickname">
                <button style="width: 100%;" onclick="startOp()">OPERASYONU BAŞLAT</button>
            </div>

            <hr style="border: 0.5px solid #004400; margin: 20px 0; width: 100%;">

            <input type="text" id="chat-msg" placeholder="Sohbete mesaj gönder...">
            <button onclick="sendChat()">MESAJI FIRLAT</button>

            <div class="action-btns">
                <button onclick="action('bot-zipla')">ZIPLAT</button>
                <button class="danger" onclick="action('bot-cikis')">BAĞLANTIYI KES</button>
            </div>
        </div>

        <div class="box">
            <h2>Bot Ekranı / Canlı Log 📡</h2>
            <div id="log-screen">
                <div class="log-entry">Sistem başlatıldı. Emir bekleniyor...</div>
            </div>
        </div>
    </div>

<script>
    // RENDER LİNKİNİ BURAYA YAPIŞTIR
    const RENDER_URL = "https://botbasma.onrender.com"; 

    function checkAuth() {
        if(document.getElementById('user').value === "admin" && document.getElementById('pass').value === "trigger123") {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('main-panel').style.display = 'grid';
            checkServerStatus();
            setInterval(checkServerStatus, 10000); // 10 saniyede bir sunucuyu kontrol et
        } else {
            alert("YETKİSİZ GİRİŞ!");
        }
    }

    // RENDER MAKİNESİ AKTİF Mİ KONTROLÜ
    function checkServerStatus() {
        const dot = document.getElementById('server-dot');
        const text = document.getElementById('server-text');
        
        fetch(`${RENDER_URL}/bot-zipla`) // Basit bir istek gönderiyoruz
            .then(() => {
                dot.className = "dot online";
                text.innerText = "AKTİF";
            })
            .catch(() => {
                dot.className = "dot offline";
                text.innerText = "KAPALI";
                addLog("UYARI: Render sunucusuna ulaşılamıyor!");
            });
    }

    function addLog(msg) {
        const logScreen = document.getElementById('log-screen');
        const time = new Date().toLocaleTimeString();
        logScreen.innerHTML += `<div class="log-entry"><span class="log-time">[${time}]</span> ${msg}</div>`;
        logScreen.scrollTop = logScreen.scrollHeight;
    }

    function startOp() {
        const ip = document.getElementById('target-ip').value;
        const nick = document.getElementById('target-nick').value;
        addLog(`Sinyal gönderiliyor: ${nick} -> ${ip}`);
        
        fetch(`${RENDER_URL}/bot-gonder?ip=${ip}&isim=${nick}`)
            .then(r => r.text())
            .then(d => {
                addLog(`SİSTEM: ${d}`);
                addLog(`Bypass Devrede: Otomatik Kayıt ve Anti-Bot tetiklendi.`);
            });
    }

    function sendChat() {
        const msg = document.getElementById('chat-msg').value;
        fetch(`${RENDER_URL}/bot-mesaj?mesaj=${msg}`)
            .then(r => r.text())
            .then(d => addLog(`CHAT: ${msg}`));
    }

    function action(type) {
        fetch(`${RENDER_URL}/${type}`)
            .then(r => r.text())
            .then(d => addLog(`KOMUT: ${d}`));
    }
</script>
</body>
</html>
