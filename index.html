<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Hub | Giriş Paneli</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="auth-body">

    <div class="auth-wrapper">
        <div class="auth-brand">
            <i class="fa-solid fa-shield-halved"></i> NEXUS<span>HUB</span>
        </div>
        
        <div class="auth-container" id="authBox">
            <h2 id="formTitle">Sisteme Giriş Yap</h2>
            
            <!-- GİRİŞ FORMU -->
            <form id="loginForm" onsubmit="submitAuth(event, 'login')">
                <div class="input-field">
                    <label><i class="fa-solid fa-envelope"></i> E-Posta</label>
                    <input type="email" id="loginEmail" required placeholder="ornek@mail.com">
                </div>
                <div class="input-field">
                    <label><i class="fa-solid fa-lock"></i> Şifre</label>
                    <input type="password" id="loginPassword" required placeholder="••••••••">
                </div>
                <button type="submit" class="btn-block">Giriş Yap</button>
                <p class="switch-text">Hesabınız yok mu? <a href="#" onclick="toggleForms('register')">Kayıt Olun</a></p>
            </form>

            <!-- KAYIT FORMU -->
            <form id="registerForm" class="hidden" onsubmit="submitAuth(event, 'register')">
                <div class="input-field">
                    <label><i class="fa-solid fa-user"></i> Kullanıcı Adı</label>
                    <input type="text" id="regUsername" required placeholder="Kullanıcı adınız">
                </div>
                <div class="input-field">
                    <label><i class="fa-solid fa-envelope"></i> E-Posta</label>
                    <input type="email" id="regEmail" required placeholder="ornek@mail.com">
                </div>
                <div class="input-field">
                    <label><i class="fa-solid fa-lock"></i> Şifre</label>
                    <input type="password" id="regPassword" required placeholder="••••••••">
                </div>
                <button type="submit" class="btn-block">Kayıt Ol</button>
                <p class="switch-text">Zaten hesabınız var mı? <a href="#" onclick="toggleForms('login')">Giriş Yapın</a></p>
            </form>
        </div>
    </div>

    <script>
        function toggleForms(type) {
            if(type === 'register') {
                document.getElementById('loginForm').classList.add('hidden');
                document.getElementById('registerForm').classList.remove('hidden');
                document.getElementById('formTitle').innerText = 'Yeni Hesap Oluştur';
            } else {
                document.getElementById('registerForm').classList.add('hidden');
                document.getElementById('loginForm').classList.remove('hidden');
                document.getElementById('formTitle').innerText = 'Sisteme Giriş Yap';
            }
        }

        async function submitAuth(event, type) {
            event.preventDefault();
            const url = type === 'login' ? '/api/auth/login' : '/api/auth/register';
            
            const payload = type === 'login' ? {
                email: document.getElementById('loginEmail').value,
                password: document.getElementById('loginPassword').value
            } : {
                username: document.getElementById('regUsername').value,
                email: document.getElementById('regEmail').value,
                password: document.getElementById('regPassword').value
            };

            const res = await fetch(url, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(payload)
            });
            const data = await res.json();
            
            alert(data.message);
            if(data.success) {
                window.location.href = '/dashboard'; // Giriş başarılıysa paneli aç
            }
        }

        // Eğer kullanıcı zaten giriş yapmışsa direkt yönlendir
        async function checkActiveSession() {
            const res = await fetch('/api/auth/session');
            const data = await res.json();
            if(data.loggedIn) {
                window.location.href = '/dashboard';
            }
        }
        checkActiveSession();
    </script>
</body>
</html>
