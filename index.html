<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>TRİGGERBABABOT CONTROL v5</title>
    <style>
        body { background: #0a0a0a; color: #00ff00; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: #111; border: 1px solid #00ff00; padding: 40px; border-radius: 15px; box-shadow: 0 0 30px #00ff0033; width: 350px; text-align: center; }
        h2 { text-transform: uppercase; letter-spacing: 3px; margin-bottom: 30px; border-bottom: 1px solid #333; padding-bottom: 10px; }
        input { background: #000; border: 1px solid #333; color: #00ff00; padding: 12px; width: 90%; margin-bottom: 15px; border-radius: 5px; outline: none; }
        input:focus { border-color: #00ff00; }
        button { background: #00ff00; color: #000; border: none; padding: 15px; width: 100%; font-weight: bold; cursor: pointer; border-radius: 5px; transition: 0.3s; margin-top: 10px; }
        button:hover { background: #00cc00; transform: scale(1.02); box-shadow: 0 0 20px #00ff00; }
        #status { margin-top: 20px; font-size: 13px; color: #888; }
    </style>
</head>
<body>

<div class="card">
    <h2>Bot Army v5</h2>
    <input type="text" id="ip" placeholder="Sunucu IP (Örn: play.xyz.com)">
    <input type="text" id="isim" placeholder="Bot Başlangıç Adı">
    <button onclick="baslat()">30 BOTU GÖNDER</button>
    <button onclick="temizle()" style="background: #444; color: white;">TEMİZLE</button>
    <div id="status">Sistem hazır.</div>
</div>

<script>
    const RENDER_URL = "https://botbasma.onrender.com";

    function baslat() {
        const ip = document.getElementById('ip').value;
        const isim = document.getElementById('isim').value;
        document.getElementById('status').innerText = "Botlar hazırlanıyor, sunucuyu izle...";
        fetch(`${RENDER_URL}/bot-gonder?ip=${ip}&isim=${isim}`);
    }

    function temizle() {
        fetch(`${RENDER_URL}/bot-temizle`);
        document.getElementById('status').innerText = "Botlar temizleniyor...";
    }
</script>

</body>
</html>
