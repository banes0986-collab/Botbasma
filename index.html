<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Hub | Premium Client Paneli</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-main: #050b14;
            --bg-surface: #0a1424;
            --bg-surface-light: #112035;
            --accent-blue: #0066ff;
            --accent-glow: rgba(0, 102, 255, 0.3);
            --text-main: #f0f4f9;
            --text-muted: #798da3;
            
            --color-kurucu: #ff3333;
            --color-genelsorumlu: #ff33cc;
            --color-admin: #ff9900;
            --color-rehber: #00ccff;
            --color-oyuncu: #00cc66;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: var(--bg-main); color: var(--text-main); overflow-x: hidden; }

        /* --- GİRİŞ / KAYIT EKRANI --- */
        .auth-page { display: flex; justify-content: center; align-items: center; min-height: 100vh; background: radial-gradient(circle at center, #0a1b3a 0%, #050b14 100%); }
        .auth-wrapper { width: 100%; max-width: 400px; padding: 20px; }
        .auth-brand { text-align: center; font-size: 32px; font-weight: 800; margin-bottom: 25px; color: #fff; text-shadow: 0 0 15px var(--accent-glow); }
        .auth-brand span { color: var(--accent-blue); }
        .auth-brand i { color: var(--accent-blue); margin-right: 10px; }
        .auth-container { background: var(--bg-surface); border: 1px solid rgba(0, 102, 255, 0.2); border-radius: 12px; padding: 35px 30px; box-shadow: 0 15px 40px rgba(0,0,0,0.8); }
        .auth-container h2 { font-size: 22px; margin-bottom: 25px; text-align: center; color: #fff; }
        .input-field { display: flex; flex-direction: column; gap: 8px; margin-bottom: 18px; }
        .input-field label { font-size: 13px; color: var(--text-muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
        .input-field input { background: var(--bg-surface-light); border: 1px solid rgba(255,255,255,0.05); padding: 14px; border-radius: 8px; color: #fff; outline: none; transition: 0.3s; font-size: 14px; }
        .input-field input:focus { border-color: var(--accent-blue); background: rgba(0, 102, 255, 0.05); }
        .btn-block { background: var(--accent-blue); color: white; border: none; padding: 14px; width: 100%; border-radius: 8px; font-weight: bold; font-size: 15px; cursor: pointer; margin-top: 10px; transition: 0.3s; text-transform: uppercase; letter-spacing: 1px; }
        .btn-block:hover { box-shadow: 0 0 20px var(--accent-glow); transform: translateY(-2px); }
        .switch-text { font-size: 14px; text-align: center; margin-top: 20px; color: var(--text-muted); }
        .switch-text span { color: var(--accent-blue); font-weight: bold; cursor: pointer; transition: 0.2s; }
        .switch-text span:hover { text-shadow: 0 0 8px var(--accent-glow); }

        /* --- DASHBOARD (KONTROL PANELİ) --- */
        .dashboard-page { display: none; min-height: 100vh; position: relative; }
        
        .navbar { background: rgba(10, 20, 36, 0.95); backdrop-filter: blur(15px); border-bottom: 1px solid rgba(0, 102, 255, 0.2); position: fixed; width: 100%; top: 0; z-index: 1000; height: 70px; display: flex; align-items: center; box-shadow: 0 4px 20px rgba(0,0,0,0.5); }
        .nav-container { width: 100%; max-width: 1400px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; padding: 0 24px; }
        .nav-left { display: flex; align-items: center; gap: 20px; }
        .menu-toggle-btn { background: none; border: none; color: #fff; font-size: 24px; cursor: pointer; transition: 0.2s; display: flex; align-items: center; justify-content: center; width: 40px; height: 40px; border-radius: 8px; }
        .menu-toggle-btn:hover { background: rgba(255,255,255,0.05); color: var(--accent-blue); }
        .brand { font-size: 22px; font-weight: 800; color: #fff; text-decoration: none; display: flex; align-items: center; gap: 8px; }
        .brand span { color: var(--accent-blue); }
        
        .nav-right { display: flex; align-items: center; gap: 15px; }
        .user-badge { display: flex; align-items: center; background: var(--bg-surface-light); padding: 8px 15px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.05); gap: 15px; }
        .u-info { display: flex; flex-direction: column; line-height: 1.3; text-align: right; }
        .u-name { font-size: 14px; font-weight: bold; color: #fff; }
        .rank-tag { font-size: 10px; font-weight: 900; text-transform: uppercase; padding: 3px 8px; border-radius: 4px; background: rgba(0,0,0,0.4); letter-spacing: 0.5px; }
        
        .nav-logout-btn { background: rgba(255, 51, 51, 0.1); border: 1px solid rgba(255, 51, 51, 0.3); color: #ff3333; padding: 10px 15px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 14px; transition: 0.3s; display: flex; align-items: center; gap: 8px; }
        .nav-logout-btn:hover { background: #ff3333; color: #fff; box-shadow: 0 0 15px rgba(255, 51, 51, 0.4); transform: translateY(-2px); }

        .rank-kurucu { color: var(--color-kurucu); border: 1px solid var(--color-kurucu); text-shadow: 0 0 8px rgba(255, 51, 51, 0.5); }
        .rank-genelsorumlu { color: var(--color-genelsorumlu); border: 1px solid var(--color-genelsorumlu); }
        .rank-admin { color: var(--color-admin); border: 1px solid var(--color-admin); }
        .rank-rehber { color: var(--color-rehber); border: 1px solid var(--color-rehber); }
        .rank-oyuncu { color: var(--color-oyuncu); border: 1px solid var(--color-oyuncu); }

        .sidebar { position: fixed; top: 70px; left: -280px; width: 280px; height: calc(100vh - 70px); background: var(--bg-surface); border-right: 1px solid rgba(0, 102, 255, 0.1); z-index: 999; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); padding: 25px 0; display: flex; flex-direction: column; justify-content: space-between; box-shadow: 5px 0 25px rgba(0,0,0,0.5); }
        .sidebar.open { left: 0; }
        .sidebar-menu { list-style: none; display: flex; flex-direction: column; gap: 8px; padding: 0 15px; }
        .sidebar-menu li a { display: flex; align-items: center; gap: 15px; padding: 14px 20px; color: var(--text-muted); text-decoration: none; font-weight: 600; font-size: 15px; border-radius: 8px; cursor: pointer; transition: 0.3s; }
        .sidebar-menu li a:hover, .sidebar-menu li a.active { color: #fff; background: var(--bg-surface-light); border-left: 4px solid var(--accent-blue); transform: translateX(5px); }
        .sidebar-menu li a i { font-size: 18px; width: 20px; text-align: center; }
        
        .sidebar-footer { padding: 0 15px 20px 15px; }
        .sidebar-footer a { display: flex; align-items: center; gap: 15px; padding: 14px 20px; color: #ff3333; text-decoration: none; font-weight: bold; font-size: 15px; border-radius: 8px; cursor: pointer; transition: 0.3s; background: rgba(255, 51, 51, 0.05); border: 1px solid transparent; }
        .sidebar-footer a:hover { background: rgba(255, 51, 51, 0.1); border-color: rgba(255, 51, 51, 0.2); transform: translateX(5px); }

        .main-content { margin-top: 70px; padding: 40px 30px; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); max-width: 1400px; margin-left: auto; margin-right: auto; }
        .main-content.shifted { margin-left: calc((100vw - 1400px) / 2 + 280px); }
        @media (max-width: 1400px) { .main-content.shifted { margin-left: 280px; } }
        @media (max-width: 768px) { .nav-right { gap: 5px; } .u-info { display: none; } .main-content.shifted { margin-left: 0; } }

        .tab-content { display: none; animation: fadeIn 0.4s ease; }
        .active-tab { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .section-header { margin-bottom: 35px; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 20px; }
        .section-header h1 { font-size: 32px; margin-bottom: 10px; color: #fff; }
        .section-header p { color: var(--text-muted); font-size: 16px; line-height: 1.5; }

        .client-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 25px; }
        .client-card { background: var(--bg-surface); border: 1px solid rgba(0, 102, 255, 0.1); border-radius: 12px; padding: 25px; transition: 0.3s; position: relative; overflow: hidden; }
        .client-card::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 3px; background: var(--accent-blue); opacity: 0; transition: 0.3s; }
        .client-card:hover { border-color: rgba(0, 102, 255, 0.4); transform: translateY(-5px); box-shadow: 0 10px 30px rgba(0,0,0,0.4); }
        .client-card:hover::before { opacity: 1; }
        
        .client-meta { display: flex; gap: 10px; margin-bottom: 15px; }
        .badge { font-size: 11px; font-weight: 800; padding: 5px 10px; border-radius: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
        .badge-version { background: rgba(255, 179, 0, 0.1); color: #ffb300; border: 1px solid rgba(255, 179, 0, 0.2); }
        .badge-api { background: rgba(0, 176, 255, 0.1); color: #00b0ff; border: 1px solid rgba(0, 176, 255, 0.2); }
        
        .client-title { font-size: 18px; font-weight: bold; margin-bottom: 20px; color: #fff; word-break: break-all; }
        
        .card-footer { display: flex; justify-content: space-between; align-items: center; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 20px; margin-top: 10px; }
        .dl-status { font-size: 13px; color: #00cc66; font-weight: 600; display: flex; align-items: center; gap: 6px; }
        
        .download-btn { background: var(--accent-blue); color: #fff; padding: 10px 20px; border-radius: 8px; font-weight: bold; text-decoration: none; font-size: 14px; display: inline-flex; align-items: center; gap:
