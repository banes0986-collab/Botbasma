<style>
    :root { --safety-blue: #0088ff; --danger-red: #ff3300; --bg: #020202; }
    body { background: var(--bg); color: #e0e0e0; font-family: 'JetBrains Mono', monospace; }
    .header { border-bottom: 2px solid var(--safety-blue); padding: 20px; text-align: center; }
    .status-grid { display: flex; gap: 20px; justify-content: center; margin-top: 30px; }
    .card { background: #0a0a0a; border: 1px solid #1a1a1a; padding: 25px; border-radius: 5px; width: 250px; text-align: center; }
    .card h3 { color: var(--safety-blue); font-size: 0.9rem; }
    .card p { font-size: 1.8rem; margin: 10px 0; font-weight: bold; }
    .action-box { max-width: 600px; margin: 40px auto; background: #080808; padding: 30px; border: 1px dashed #333; }
    input { width: 100%; padding: 15px; background: #000; border: 1px solid #222; color: #00ff00; margin-bottom: 20px; }
    button { width: 100%; padding: 15px; background: var(--safety-blue); border: none; color: white; cursor: pointer; font-weight: bold; }
    button:hover { background: #0066cc; }
</style>

<div class="header">
    <h1>REAPER CYBER-SECURITY AUDIT</h1>
    <p>Enterprise Stress Testing Platform | Ryzen 9 Powered</p>
</div>

<div class="status-grid">
    <div class="card">
        <h3>LATENCY (MS)</h3>
        <p id="latency">0</p>
    </div>
    <div class="card">
        <h3>LOAD CAPACITY</h3>
        <p id="load">STABLE</p>
    </div>
    <div class="card">
        <h3>ACTIVE PROBES</h3>
        <p id="probes">0</p>
    </div>
</div>

<div class="action-box">
    <label>TARGET INFRASTRUCTURE (IP:PORT)</label>
    <input type="text" id="target" placeholder="127.0.0.1:25565">
    <button onclick="startAudit()">INITIATE CAPACITY TEST</button>
</div>

<script>
    const API = "https://botbasma.onrender.com";
    async function startAudit() {
        const ip = document.getElementById('target').value;
        await fetch(`${API}/start-audit`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ ip })
        });
        alert("Denetim Başlatıldı. Veriler akıyor...");
    }

    setInterval(async () => {
        const res = await fetch(`${API}/audit-status`);
        const data = await res.json();
        document.getElementById('latency').innerText = data.latency;
        document.getElementById('load').innerText = data.loadCapacity;
        document.getElementById('probes').innerText = data.activeConnections;
        if(data.latency > 1000) document.getElementById('load').style.color = "red";
    }, 2000);
</script>
