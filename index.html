<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRIGGERBABA | VIP GHOST ENGINE</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --neon-red: #ff0000; --dark-bg: #050505; --card-bg: rgba(20, 20, 20, 0.9); }
        
        body { 
            background: var(--dark-bg); 
            color: white; 
            font-family: 'Orbitron', sans-serif; 
            margin: 0; 
            overflow: hidden; /* Matrix efekti için */
        }

        /* MATRIX BACKGROUND CANVAS */
        #matrix-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            opacity: 0.15;
        }

        .container { 
            max-width: 800px; 
            margin: 40px auto; 
            padding: 20px; 
            position: relative;
            z-index: 1;
        }

        header { 
            text-align: center; 
            margin-bottom: 30px; 
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); text-shadow: 0 0 10px var(--neon-red); }
            50% { transform: scale(1.02); text-shadow: 0 0 30px var(--neon-red); }
            100% { transform: scale(1); text-shadow: 0 0 10px var(--neon-red); }
        }

        .status-panel {
            display: flex;
            justify-content: space-around;
            background: var(--card-bg);
            padding: 15px;
            border-radius: 10px;
            border: 1px solid #333;
            margin-bottom: 20px;
            backdrop-filter: blur(5px);
        }

        .tps-box h2 { font-size: 2.5rem; margin: 5px 0; color: #00ff00; }

        .attack-card {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 15px;
            border: 1px solid #222;
            box-shadow: 0 0 50px rgba(255,0,0,0.1);
        }

        input {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            background: #111;
            border: 1px solid #444;
            color: #00ff00;
            border-radius: 5px;
            font-family: 'Courier New', monospace;
        }

        .btn {
            width: 100%;
            padding: 18px;
            margin-top: 15px;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-start { background: var(--neon-red); color: white; font-size: 1.1rem; }
        .btn-start:hover { box-shadow: 0 0 20px var(--neon-red); transform: translateY(-2px); }

        #console {
            background: rgba(0,0,0,0.8);
            height: 120px;
            margin-top: 20px;
            padding: 10px;
            border-radius: 5px;
            font-size: 0.8rem;
            overflow-y: auto;
            border: 1px solid #333;
            color: #888;
        }

        .highlight { color: var(--neon-red); font-weight: bold; }
    </style>
</head>
<body>

<canvas id="matrix-bg"></canvas>

<div class="container">
    <header>
        <h1><i class="fas fa-biohazard"></i> TRIGGERBABA VIP</h1>
        <p>GHOST ENGINE v14.0 | ELITE BYPASS SYSTEM</p>
    </header>

    <div class="status-panel">
        <div class="tps-box" style="text-align: center;">
            <small>HEDEF SUNUCU TPS</small>
            <h2 id="live-tps">20.0</h2>
            <div id="status-text" style="font-size: 0.7rem; color: #888;">DURUM: BEKLEMEDE</div>
        </div>
    </div>

    <div class="attack-card">
        <label><i class="fas fa-link"></i> SUNUCU ADRESI</label>
        <input type="text" id="target" placeholder="play.server.com:25565">
        
        <label><i class="fas fa-ghost"></i> BOT ADEDI</label>
        <input type="number" id="count" value="100">

        <button class="btn btn-start" onclick="launch()"><i class="fas fa-skull"></i> SALDIRIYI BAŞLAT</button>
        
        <div id="console">> [System] Hazır. Hedef bekleniyor...</div>
    </div>
</div>
