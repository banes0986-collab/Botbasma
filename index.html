<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LegacyBots | Multi-Connect Panel</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="dashboard-container">
        <header class="main-header">
            <div class="logo">Legacy<span>Bots</span></div>
            <div class="tagline">Dinamik Minecraft Bot Gönderme Paneli</div>
        </header>

        <main class="status-card">
            <h2>Sunucu Bağlantı Ayarları</h2>
            
            <div class="form-group">
                <label for="server-ip">Sunucu IP / Adresi</label>
                <input type="text" id="server-ip" placeholder="Örn: oyna.mcsh.in veya sunucu.aternos.me">
            </div>

            <div class="form-group">
                <label for="server-port">Sunucu Portu</label>
                <input type="number" id="server-port" value="25565" placeholder="Varsayılan: 25565">
            </div>

            <button id="send-btn" onclick="sendBotToServer()">Botu Gönder</button>

            <div class="console-box">
                <div class="console-header">İşlem Günlüğü</div>
                <div id="console-logs" class="console-content">
                    [Sistem] Hedef sunucu bilgilerini girip "Botu Gönder" butonuna basın.
                </div>
            </div>
        </main>

        <footer class="main-footer">
            Geliştirici: <span class="owner">TriggerBaba</span> &copy; 2026
        </footer>
    </div>

    <script>
        async function sendBotToServer() {
            const ip = document.getElementById('server-ip').value.trim();
            const port = document.getElementById('server-port').value.trim();
            const logBox = document.getElementById('console-logs');
            const btn = document.getElementById('send-btn');

            if(!ip || !port) {
                alert("Lütfen hem IP hem de Port alanlarını doldurun!");
                return;
            }

            // Butonu geçici olarak devre dışı bırakıyoruz
            btn.innerText = "Gönderiliyor...";
            btn.disabled = true;

            try {
                const response = await fetch('/api/send-bot', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ ip: ip, port: port })
                });

                const data = await response.json();
                const zaman = new Date().toLocaleTimeString();

                if(data.success) {
                    logBox.innerHTML += `<br><span class="log-success">[${zaman}] ${data.message}</span>`;
                } else {
                    logBox.innerHTML += `<br><span class="log-danger">[${zaman}] Hata: ${data.message}</span>`;
                }
            } catch (error) {
                const zaman = new Date().toLocaleTimeString();
                logBox.innerHTML += `<br><span class="log-danger">[${zaman}] API sunucusuna bağlanılamadı.</span>`;
            } finally {
                // Butonu tekrar aktif ediyoruz
                btn.innerText = "Botu Gönder";
                btn.disabled = false;
                // Konsolu otomatik en aşağı kaydırır
                logBox.scrollTop = logBox.scrollHeight;
            }
        }
    </script>
</body>
</html>
