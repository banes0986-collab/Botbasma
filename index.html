<div class="panel" style="border: 2px solid #00f2ff; padding: 20px; background: #000; color: #00f2ff; text-align: center;">
    <h2>BOT ARMY CONTROL v4</h2>
    <input type="text" id="ip" placeholder="Sunucu IP" style="background:#111; color:#00f2ff; border:1px solid #00f2ff; padding:10px;">
    <input type="text" id="isim" placeholder="Bot Ön Eki (örn: Gemini)" style="background:#111; color:#00f2ff; border:1px solid #00f2ff; padding:10px;">
    <br><br>
    <button onclick="saldir()" style="background:#00f2ff; color:#000; padding:15px 30px; font-weight:bold; cursor:pointer;">30 BOTU GÖNDER</button>
    <button onclick="cikar()" style="background:red; color:white; padding:15px 30px; font-weight:bold; cursor:pointer;">HEPSİNİ ÇIKAR</button>
    <div id="log" style="margin-top:20px; font-family:monospace; font-size:12px;">Hazır...</div>
</div>

<script>
    const RENDER_URL = "https://botbasma.onrender.com";
    function saldir() {
        const ip = document.getElementById('ip').value;
        const isim = document.getElementById('isim').value;
        document.getElementById('log').innerText = "Ordu yola çıktı, sunucu listesine bak!";
        fetch(`${RENDER_URL}/bot-gonder?ip=${ip}&isim=${isim}`);
    }
    function cikar() {
        fetch(`${RENDER_URL}/bot-cikar`);
        document.getElementById('log').innerText = "Botlar geri çekiliyor...";
    }
</script>
